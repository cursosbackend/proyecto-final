<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}E-Commerce{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="{% url 'lista_productos' %}" class="text-xl font-bold text-indigo-600">E-Commerce</a>
                <div class="flex items-center gap-4">
                    <a href="{% url 'lista_productos' %}" class="text-gray-600 hover:text-indigo-600">Productos</a>
                    {% if user.is_authenticated %}
                        <a href="{% url 'ver_carrito' %}" class="text-gray-600 hover:text-indigo-600">Carrito</a>
                        <a href="{% url 'historial_ordenes' %}" class="text-gray-600 hover:text-indigo-600">Mis Pedidos</a>
                        <span class="text-sm text-gray-500">{{ user.username }}</span>
                        <a href="{% url 'logout' %}" class="bg-gray-200 px-3 py-1.5 rounded text-sm hover:bg-gray-300">Salir</a>
                    {% else %}
                        <a href="{% url 'login' %}" class="text-gray-600 hover:text-indigo-600">Ingresar</a>
                        <a href="{% url 'registro' %}" class="bg-indigo-600 text-white px-3 py-1.5 rounded text-sm hover:bg-indigo-700">Registrarse</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
