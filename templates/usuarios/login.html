{% extends "base.html" %}
{% block title %}Iniciar Sesión - E-Commerce{% endblock %}
{% block content %}
    <div class="max-w-md mx-auto mt-12">
        <div class="bg-white rounded-lg shadow-sm border p-6">
            <h1 class="text-2xl font-bold mb-6 text-center">Iniciar Sesión</h1>
            {% if error %}
                <p class="bg-red-100 text-red-700 px-3 py-2 rounded mb-4 text-sm">{{ error }}</p>
            {% endif %}
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
                    <input type="text" name="username" required class="w-full border rounded px-3 py-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" name="password" required class="w-full border rounded px-3 py-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700 font-medium">Ingresar</button>
            </form>
            <p class="text-sm text-center mt-4 text-gray-500">
                ¿No tenés cuenta? <a href="{% url 'registro' %}" class="text-indigo-600 hover:underline">Registrate</a>
            </p>
        </div>
    </div>
{% endblock %}
